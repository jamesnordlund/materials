[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "materials-data-workflows"
version = "0.1.0"
description = "Agent Skills for materials science data-to-decision workflows using Materials Project and MPContribs data"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.11"
authors = [
    {name = "James Nordlund"}
]
keywords = [
    "materials-science",
    "materials-project",
    "screening",
    "agent-skills",
    "pareto",
    "electrodes",
    "provenance"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Chemistry",
    "Topic :: Scientific/Engineering :: Physics",
]

dependencies = [
    "numpy>=1.24",
    "pandas>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.8.0",
]

[project.urls]
Homepage = "https://github.com/jamesnordlund/materials"
Repository = "https://github.com/jamesnordlund/materials"

[tool.hatch.build.targets.wheel]
packages = ["skills"]

[tool.pytest.ini_options]
testpaths = ["skills", "tests"]
python_files = ["test_*.py"]
importmode = "importlib"
