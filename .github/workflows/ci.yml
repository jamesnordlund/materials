name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install workspace
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run simulation-skills unit tests
        run: |
          uv run --package materials-simulation-skills pytest packages/materials-simulation-skills/tests/unit -v --tb=short

      - name: Run simulation-skills integration tests
        run: |
          uv run --package materials-simulation-skills pytest packages/materials-simulation-skills/tests/integration -v --tb=short

      - name: Run mcp tests
        run: |
          uv run --package materials-mcp pytest packages/materials-mcp/tests -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-extras --python 3.11

      - name: Ruff check
        run: uv run ruff check packages/

      - name: Check Python syntax
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python -m py_compile skills/core-numerical/numerical-stability/scripts/*.py
          uv run python -m py_compile skills/core-numerical/numerical-integration/scripts/*.py
          uv run python -m py_compile skills/core-numerical/linear-solvers/scripts/*.py
          uv run python -m py_compile skills/core-numerical/time-stepping/scripts/*.py
          uv run python -m py_compile skills/core-numerical/differentiation-schemes/scripts/*.py
          uv run python -m py_compile skills/core-numerical/mesh-generation/scripts/*.py
          uv run python -m py_compile skills/simulation-workflow/simulation-validator/scripts/*.py
          uv run python -m py_compile skills/simulation-workflow/parameter-optimization/scripts/*.py
          uv run python -m py_compile skills/simulation-workflow/simulation-orchestrator/scripts/*.py
          uv run python -m py_compile skills/simulation-workflow/post-processing/scripts/*.py

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace
        run: uv sync --all-extras --python 3.11

      - name: Test example scripts (numerical-stability)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/core-numerical/numerical-stability/scripts/cfl_checker.py --dx 0.1 --dt 0.01 --velocity 1.0 --json
          uv run python skills/core-numerical/numerical-stability/scripts/stiffness_detector.py --eigs=-1,-100 --json

      - name: Test example scripts (numerical-integration)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/core-numerical/numerical-integration/scripts/integrator_selector.py --stiff --json
          uv run python skills/core-numerical/numerical-integration/scripts/error_norm.py --error 1e-3,1e-4,1e-5 --solution 1.0,1.0,1.0 --json

      - name: Test example scripts (linear-solvers)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/core-numerical/linear-solvers/scripts/solver_selector.py --symmetric --positive-definite --size 1000 --json
          uv run python skills/core-numerical/linear-solvers/scripts/preconditioner_advisor.py --matrix-type spd --json

      - name: Test example scripts (time-stepping)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/core-numerical/time-stepping/scripts/timestep_planner.py --dt-target 0.1 --dt-limit 0.2 --json
          uv run python skills/core-numerical/time-stepping/scripts/checkpoint_planner.py --run-time 1000 --checkpoint-cost 60 --json

      - name: Test example scripts (differentiation-schemes)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/core-numerical/differentiation-schemes/scripts/scheme_selector.py --order 2 --smooth --json
          uv run python skills/core-numerical/differentiation-schemes/scripts/stencil_generator.py --order 2 --json

      - name: Test example scripts (mesh-generation)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/core-numerical/mesh-generation/scripts/grid_sizing.py --length 1.0 --resolution 100 --json
          uv run python skills/core-numerical/mesh-generation/scripts/mesh_quality.py --dx 0.1 --dy 0.1 --dz 0.35 --json

      - name: Test example scripts (simulation-validator)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/simulation-workflow/simulation-validator/scripts/preflight_checker.py --config examples/simulation-validator/simulation_config.json --json
          uv run python skills/simulation-workflow/simulation-validator/scripts/runtime_monitor.py --log examples/simulation-validator/simulation.log --json

      - name: Test example scripts (parameter-optimization)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/simulation-workflow/parameter-optimization/scripts/doe_generator.py --params 3 --budget 10 --method lhs --json
          uv run python skills/simulation-workflow/parameter-optimization/scripts/optimizer_selector.py --dim 5 --budget 50 --json

      - name: Test example scripts (simulation-orchestrator)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/simulation-workflow/simulation-orchestrator/scripts/sweep_generator.py --base-config examples/simulation-orchestrator/base_config.json --params "dt:0.001:0.01:3" --method linspace --output-dir /tmp/sweep_test --json

      - name: Test example scripts (post-processing)
        working-directory: packages/materials-simulation-skills
        run: |
          uv run python skills/simulation-workflow/post-processing/scripts/field_extractor.py --input examples/post-processing/field_output.json --field phi --json
          uv run python skills/simulation-workflow/post-processing/scripts/time_series_analyzer.py --input examples/post-processing/history.json --quantity energy --json
          uv run python skills/simulation-workflow/post-processing/scripts/statistical_analyzer.py --input examples/post-processing/field_output.json --field phi --json
          uv run python skills/simulation-workflow/post-processing/scripts/derived_quantities.py --input examples/post-processing/field_output.json --quantity volume_fraction --field phi --threshold 0.5 --json
